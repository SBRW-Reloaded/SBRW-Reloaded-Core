# Datasource
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/SOAPBOX
quarkus.datasource.username=soapbox
quarkus.datasource.password=secrets
quarkus.datasource.jdbc.max-size=64
quarkus.datasource.jdbc.min-size=8
quarkus.datasource.jdbc.validation-query-sql=SELECT 1
quarkus.datasource.jdbc.background-validation-interval=0S

# Hibernate
quarkus.hibernate-orm.persistence-xml.ignore=true
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=false

# HTTP compression (replacement for Undertow filter)
quarkus.http.enable-compression=true
quarkus.http.compress-media-types=application/javascript,text/css,text/html,text/xml,application/json,application/xml

# Mailer (replacement for Thorntail mail session)
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=465
quarkus.mailer.ssl=true
quarkus.mailer.username=serveremailhere@gmail.com
quarkus.mailer.password=secret

